name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/release.yaml'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  ALIEN_IMAGE_NAME: nowhereworks/alienshard

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test with coverage
        run: go test ./... -coverprofile=coverage.out -covermode=atomic

      - name: Report coverage
        run: go tool cover -func=coverage.out

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: alienshard_linux_amd64
          - goos: linux
            goarch: arm64
            artifact: alienshard_linux_arm64
          - goos: darwin
            goarch: amd64
            artifact: alienshard_darwin_amd64
          - goos: darwin
            goarch: arm64
            artifact: alienshard_darwin_arm64
          - goos: windows
            goarch: amd64
            artifact: alienshard_windows_amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/${{ matrix.artifact }}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum alienshard_* > SHA256SUMS

      - name: Write latest release notes
        if: github.ref == 'refs/heads/main'
        run: |
          cat > release-notes.md <<'EOF'
          Latest build from the `main` branch.

          ## Verify checksums

          Linux:
          `sha256sum -c SHA256SUMS`

          macOS:
          `shasum -a 256 -c SHA256SUMS`
          EOF

      - name: Write tag release notes
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cat > release-notes.md <<'EOF'
          Release `${{ github.ref_name }}`.

          ## Verify checksums

          Linux:
          `sha256sum -c SHA256SUMS`

          macOS:
          `shasum -a 256 -c SHA256SUMS`
          EOF

      - name: Replace latest release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view latest >/dev/null 2>&1; then
            gh release delete latest --cleanup-tag -y
          fi

          if gh api "repos/${{ github.repository }}/git/ref/tags/latest" >/dev/null 2>&1; then
            gh api -X DELETE "repos/${{ github.repository }}/git/refs/tags/latest"
          fi

          gh release create latest \
            dist/* \
            --target "${GITHUB_SHA}" \
            --title "latest" \
            --notes-file release-notes.md

      - name: Create tag release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release edit "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --notes-file release-notes.md
          else
            gh release create "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --notes-file release-notes.md \
              --verify-tag
          fi

          gh release upload "${{ github.ref_name }}" dist/* --clobber

  docker-image:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: github-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ALIEN_IMAGE_NAME }}
          tags: |
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
