name: Release Latest

on:
  push:
    branches:
      - main
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: write

concurrency:
  group: release-latest
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test with coverage
        run: go test ./... -coverprofile=coverage.out -covermode=atomic

      - name: Report coverage
        run: go tool cover -func=coverage.out

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: alienshard_linux_amd64
          - goos: linux
            goarch: arm64
            artifact: alienshard_linux_arm64
          - goos: darwin
            goarch: amd64
            artifact: alienshard_darwin_amd64
          - goos: darwin
            goarch: arm64
            artifact: alienshard_darwin_arm64
          - goos: windows
            goarch: amd64
            artifact: alienshard_windows_amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/${{ matrix.artifact }}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Publish latest release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum alienshard_* > SHA256SUMS

      - name: Write release notes
        run: |
          cat > release-notes.md <<'EOF'
          Latest build from the `main` branch.

          ## Verify checksums

          Linux:
          `sha256sum -c SHA256SUMS`

          macOS:
          `shasum -a 256 -c SHA256SUMS`
          EOF

      - name: Replace latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view latest >/dev/null 2>&1; then
            gh release delete latest --cleanup-tag -y
          fi

          if gh api "repos/${{ github.repository }}/git/ref/tags/latest" >/dev/null 2>&1; then
            gh api -X DELETE "repos/${{ github.repository }}/git/refs/tags/latest"
          fi

          gh release create latest \
            dist/* \
            --target "${GITHUB_SHA}" \
            --title "latest" \
            --notes-file release-notes.md
